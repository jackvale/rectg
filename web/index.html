<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rectg - Telegram 优质中文导航</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body class="light">
  <div id="app">
    <!-- 侧边栏 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"></path>
            <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
          </svg>
          <h1>rectg 导航</h1>
        </div>
        <button id="close-sidebar-btn" aria-label="关闭侧边栏">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <nav id="category-nav">
        <!-- 分类列表通过 JS 注入 -->
      </nav>
      <div class="sidebar-footer">
        <a href="https://github.com/jackhawks/rectg" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
            </path>
          </svg>
          提交收录
        </a>
      </div>
    </aside>

    <!-- 移动端侧边栏遮罩 -->
    <div id="sidebar-overlay"></div>

    <!-- 主内容区 -->
    <main>
      <header>
        <div class="header-left">
          <button id="menu-btn" aria-label="菜单">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <!-- 移动端显示的标题 -->
          <h2 class="mobile-title">rectg 导航</h2>
        </div>

        <div class="header-right">
          <div class="search-box">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="search-input" placeholder="搜索资源、全能搜..." />
          </div>
          <button id="theme-toggle" aria-label="切换主题">
            <svg class="moon-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
              fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
              fill="none" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </header>

      <div class="hero">
        <h1 class="hero-title">rectg – Telegram 精选导航</h1>
        <p class="hero-subtitle">1000+ 优质中文频道与群组推荐，持续更新</p>
      </div>

      <div class="bulletin" id="bulletin">
        <span class="bulletin-icon">📢</span>
        <div class="bulletin-text-container">
          <!-- 通过 JS 滚动播放通知 -->
          <span id="bulletin-text">本站数据基于 GitHub README 自动构建部署，已收录 700+ 高质量内容。</span>
        </div>
      </div>

      <!-- 内容区卡片列表 -->
      <div id="content-container">
        <!-- 动态渲染分类板块 -->
        <div class="loading">加载数据中...</div>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    <div class="footer-content">
      <p>⚠️ <strong>免责声明</strong>：本网站仅供技术学习与信息导航使用。严禁中国大陆地区用户使用，所有使用者须严格遵守所在地区法律法规，一切因违规使用产生的法律责任均与本网站无关。</p>
      <p class="footer-copyright">© 2026 rectg – Telegram 精选导航</p>
    </div>
  </footer>

  <script src="/main.js"></script>
</body>

</html>
